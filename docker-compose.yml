services:

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - temp_data:/app/temp

  worker:
    build: ./backend
    command: celery -A workers.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - temp_data:/app/temp

volumes:
  temp_data: